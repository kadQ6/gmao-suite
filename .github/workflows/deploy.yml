name: Deploy to VPS — kbio-conseil.com

# Déclenchement automatique à chaque push sur la branche main
on:
  push:
      branches:
            - main

            jobs:
              deploy:
                  name: "Build & Deploy sur le VPS Hostinger"
                      runs-on: ubuntu-latest

                          steps:
                                # ── Étape 1 : Se connecter au VPS via SSH et tout faire en une seule session ──
                                      - name: "SSH → git pull + npm build + pm2 restart"
                                              uses: appleboy/ssh-action@v1.0.3
                                                      with:
                                                                host: ${{ secrets.VPS_HOST }}
                                                                          username: ${{ secrets.VPS_USER }}
                                                                                    password: ${{ secrets.VPS_PASSWORD }}
                                                                                              port: 22
                                                                                                        # Timeout de connexion
                                                                                                                  connect_timeout: 30s
                                                                                                                            # Script exécuté sur le VPS
                                                                                                                                      script: |
                                                                                                                                                  set -e
                                                                                                                                                              echo "========================================"
                                                                                                                                                                          echo " DÉPLOIEMENT kbio-conseil.com"
                                                                                                                                                                                      echo " $(date '+%Y-%m-%d %H:%M:%S')"
                                                                                                                                                                                                  echo "========================================"
                                                                                                                                                                                                  
                                                                                                                                                                                                              # ── 1. Aller dans le dossier du projet ──
                                                                                                                                                                                                                          PROJECT_DIR="/var/www/gmao-suite/current"
                                                                                                                                                                                                                                      if [ ! -d "$PROJECT_DIR" ]; then
                                                                                                                                                                                                                                                    echo "❌ Dossier introuvable : $PROJECT_DIR"
                                                                                                                                                                                                                                                                  exit 1
                                                                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                                                                                          cd "$PROJECT_DIR"
                                                                                                                                                                                                                                                                                                      echo "✅ Dossier : $PROJECT_DIR"
                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                  # ── 2. git pull — récupère le dernier commit depuis GitHub ──
                                                                                                                                                                                                                                                                                                                              echo ""
                                                                                                                                                                                                                                                                                                                                          echo "📥 git pull..."
                                                                                                                                                                                                                                                                                                                                                      git pull --ff-only origin main
                                                                                                                                                                                                                                                                                                                                                                  echo "✅ Code mis à jour"
                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                              # ── 3. npm ci — installe les dépendances si elles ont changé ──
                                                                                                                                                                                                                                                                                                                                                                                          echo ""
                                                                                                                                                                                                                                                                                                                                                                                                      echo "📦 Installation des dépendances..."
                                                                                                                                                                                                                                                                                                                                                                                                                  npm ci --prefer-offline --no-audit
                                                                                                                                                                                                                                                                                                                                                                                                                              echo "✅ Dépendances OK"
                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                          # ── 4. npm run build — compile le site Next.js en production ──
                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "🔨 Build Next.js..."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              NODE_ENV=production npm run build
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "✅ Build terminé"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # ── 5. pm2 restart — redémarre le serveur sans interruption ──
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "🔄 Redémarrage PM2 (kbio-conseil)..."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          pm2 restart kbio-conseil --update-env
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "✅ PM2 redémarré"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # ── 6. Vérification finale ──
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "📊 Statut PM2 :"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      pm2 status kbio-conseil
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "========================================"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo " ✅ DÉPLOIEMENT RÉUSSI"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "========================================"
