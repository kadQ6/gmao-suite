name: Deploy to VPS kbio-conseil.com

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: "Build and Deploy sur le VPS Hostinger"
    runs-on: ubuntu-latest

    steps:
      - name: "SSH git pull npm build pm2 restart"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 30s
          script: |
            set -e
            echo "========================================"
            echo " DEPLOIEMENT kbio-conseil.com"
            echo "========================================"

            PROJECT_DIR="/var/www/gmao-suite/current"
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "ERREUR: Dossier introuvable"
              exit 1
            fi
            cd "$PROJECT_DIR"
            echo "OK Dossier OK"

            git pull --ff-only origin main
            echo "OK Code mis a jour"

            npm ci --prefer-offline --no-audit
            echo "OK Dependances OK"

            NODE_ENV=production npm run build
            echo "OK Build termine"

            pm2 restart kbio-conseil --update-env
            echo "OK PM2 redemarre"

            pm2 status kbio-conseil

            echo "========================================"
            echo " DEPLOIEMENT REUSSI"
            echo "========================================"
